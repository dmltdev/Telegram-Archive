<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2AABEE"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Database cylinder -->
  <g transform="translate(80, 55)">
    <ellipse cx="40" cy="10" rx="35" ry="10" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <rect x="5" y="10" width="70" height="65" fill="url(#glow)" stroke="none"/>
    <line x1="5" y1="10" x2="5" y2="75" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <line x1="75" y1="10" x2="75" y2="75" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <ellipse cx="40" cy="75" rx="35" ry="10" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <!-- Mid rings -->
    <ellipse cx="40" cy="35" rx="35" ry="8" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <ellipse cx="40" cy="55" rx="35" ry="8" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Title -->
  <text x="200" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Telegram Archive
  </text>

  <!-- Subtitle -->
  <text x="202" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    Own your Telegram history with automated incremental backups
  </text>

  <!-- Decorative: message timeline on right -->
  <g transform="translate(770, 40)" opacity="0.2">
    <!-- Timeline line -->
    <line x1="10" y1="0" x2="10" y2="120" stroke="#ffffff" stroke-width="2"/>
    <!-- Messages -->
    <circle cx="10" cy="10" r="5" fill="#ffffff"/>
    <rect x="22" y="4" width="50" height="12" rx="6" fill="#ffffff" opacity="0.7"/>
    <circle cx="10" cy="40" r="5" fill="#ffffff" opacity="0.8"/>
    <rect x="22" y="34" width="40" height="12" rx="6" fill="#ffffff" opacity="0.6"/>
    <circle cx="10" cy="70" r="5" fill="#ffffff" opacity="0.6"/>
    <rect x="22" y="64" width="55" height="12" rx="6" fill="#ffffff" opacity="0.5"/>
    <circle cx="10" cy="100" r="5" fill="#ffffff" opacity="0.4"/>
    <rect x="22" y="94" width="35" height="12" rx="6" fill="#ffffff" opacity="0.4"/>
  </g>
</svg>
